services:
  - type: web
    name: dressedup-backend
    runtime: docker
    plan: free
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ENV
        value: production
      - key: ALLOWED_ORIGINS
        sync: false
      - key: RUN_MIGRATIONS_ON_STARTUP
        value: "true"
      - key: STORAGE_PROVIDER
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: S3_PUBLIC_BASE_URL
        sync: false

