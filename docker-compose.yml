version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: dressedup-db
    environment:
      POSTGRES_DB: dressedup
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dressedup"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dressedup-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/dressedup
      SECRET_KEY: local-dev-secret-key
      DEBUG: "True"
      ENV: development
      ALLOWED_ORIGINS: http://localhost:8081,http://localhost:19006
      RUN_MIGRATIONS_ON_STARTUP: "true"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres_data:

