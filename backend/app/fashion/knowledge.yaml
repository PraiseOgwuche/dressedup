    min_formality: casual
    color_palette: [cream, white, blush, sage, denim, tan, camel, light-blue, olive, stripe]
  interview:
    formality_gap_max: 1
    min_formality: smart-casual
    banned_footwear: [sneakers, sandals, slides, flip-flops, trainers]
    color_palette: [navy, charcoal, gray, grey, white, black, beige, brown, cream]
