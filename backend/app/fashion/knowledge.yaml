  harmonious:
    - [cotton, denim]
    - [cotton, linen]
    - [wool, leather]
    - [wool, cotton]
    - [cashmere, wool]
    - [silk, wool]
    - [silk, cotton]
    - [leather, denim]
    - [linen, cotton]
    - [suede, denim]
    - [suede, cotton]
    - [denim, leather]
  # Pairs that read unintentional in everyday outfits.
  clashing:
    - [nylon, silk]
    - [polyester, silk]
    - [nylon, wool]
    - [elastane, silk]
    - [acrylic, silk]
    - [down, silk]
  # Default formality association when item formality is unknown.
  material_formality:
    silk: business
    cashmere: business
    wool: smart-casual
    linen: casual
    denim: casual
    leather: smart-casual
    suede: casual
    polyester: casual
    nylon: casual
    elastane: loungewear

category_rules:
  - categories: [activewear, swimwear]
    incompatible_formality: [business, formal]
  - categories: [swimwear]
    incompatible_occasions: [work, formal-event]

weather_seasons:
