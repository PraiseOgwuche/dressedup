    materials: [cotton, nylon, fleece, denim, leather, elastane]
    footwear: [sneakers, trainers, boots, sandals]

# Balanced silhouette pairings — proportion harmony.
silhouette:
  balanced_pairs:
    - top_fit: [oversized, relaxed, boxy, hoodie, sweater, crewneck]
      bottom_fit: [slim, skinny, tailored, straight, chinos, trousers]
      bonus: 0.45
      note: relaxed top with cleaner bottom
    - top_fit: [fitted, slim, tank, bodysuit, cropped]
      bottom_fit: [wide-leg, palazzo, relaxed, baggy, wide, flare]
      bonus: 0.40
      note: fitted top balances volume on the bottom
    - top_fit: [tunic, longline, duster]
      bottom_fit: [slim, skinny, leggings, straight]
      bonus: 0.35
      note: long top needs a streamlined base

# Classic outfit formulas — archetype bonuses when slots align.
archetypes:
  - name: smart separate
    slots:
      top: [blazer, jacket, oxford, shirt, sweater]
      bottom: [trousers, chinos, slacks, dress-pants]
      footwear: [loafers, oxfords, brogues, derbies, heels, boots]
    bonus: 0.50
  - name: casual uniform
    slots:
      top: [t-shirt, tee, henley, sweatshirt]
      bottom: [jeans, denim, chinos, shorts]
      footwear: [sneakers, trainers, sandals, boots]
    bonus: 0.35
  - name: weekend polish
    slots:
      top: [polo, oxford, sweater, knit]
      bottom: [chinos, trousers, jeans]
      footwear: [loafers, boat-shoes, sneakers, boots]
    bonus: 0.40
  - name: evening out
    slots:
      top: [blouse, shirt, bodysuit, knit, blazer]
      bottom: [trousers, skirt, dress-pants, jeans]
      footwear: [heels, boots, loafers, dress-shoes]
    bonus: 0.45

# Rule-based closet gap hints (used when LLM stylist is off).
gap_priorities:
  - category: bottom
    unlock_weight: 1.0
    hint: "Versatile bottoms anchor most outfits — chinos or dark denim unlock the most tops."
  - category: footwear
    unlock_weight: 0.9
    hint: "Shoes set the tone — one clean sneaker and one smart pair cover most occasions."
  - category: top
    unlock_weight: 0.85
    hint: "Neutral tops multiply combinations — white, navy, and grey tees go with everything."
  - category: outerwear
    unlock_weight: 0.7
    hint: "A layer piece extends seasonal range without replacing your core wardrobe."

# Weather layering guidance.
weather_layering:
  cold:
    prefer_outerwear: true
    bonus_materials: [wool, cashmere, fleece, down, leather]
  rainy:
    prefer_outerwear: true
    bonus_materials: [nylon, polyester, waxed-cotton, gore-tex]
  snow:
    prefer_outerwear: true
    bonus_materials: [wool, down, fleece, thermal]
  mild:
    prefer_outerwear: false
  warm:
    prefer_outerwear: false
    prefer_materials: [linen, cotton, jersey]
  hot:
    prefer_outerwear: false
    prefer_materials: [linen, cotton, mesh, jersey]
