    colors: [navy, white, cream, khaki, burgundy, forest, pink, yellow, light-blue]
    patterns: [striped, plaid, checked, solid]
    avoid_patterns: [graphic, camo]
    materials: [cotton, wool, linen, cashmere, leather]
    footwear: [loafers, boat-shoes, sneakers, boots, oxfords]
  classic:
