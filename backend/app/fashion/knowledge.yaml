# DressedUp fashion knowledge base (Layer 1 — universal styling rules).
# Edit this file to expand rules without touching Python scoring code.
# References: Itten color theory; capsule wardrobe guides (GQ, Esquire); pattern-mixing
# conventions; dress-code references (business casual, black-tie adjacent).

meta:
  version: 2
  description: Universal outfit-matching rules before user personalization.

