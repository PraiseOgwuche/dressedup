    - [camel, black]
    - [camel, white]
    - [olive, tan]
    - [olive, cream]
    - [olive, white]
    - [burgundy, navy]
    - [burgundy, gray]
    - [burgundy, grey]
    - [burgundy, cream]
    - [denim, white]
    - [denim, cream]
    - [denim, brown]
    - [denim, tan]
    - [teal, camel]
    - [teal, cream]
    - [white, tan]
    - [white, sand]
    - [pink, gray]
    - [pink, grey]
    - [blush, gray]
    - [blush, grey]
