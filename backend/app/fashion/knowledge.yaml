occasions:
  formal-event:
    formality_gap_max: 0
    min_formality: business
    banned_footwear: [sneakers, sandals, slides, trainers, flip-flops]
    required_polish: true
    color_palette: [black, charcoal, navy, white, ivory, burgundy, silver, gray, grey]
  work:
    formality_gap_max: 1
    min_formality: smart-casual
    banned_footwear: [flip-flops, slides]
    color_palette: [navy, charcoal, gray, grey, white, blue, beige, camel, brown, black]
  date:
    formality_gap_max: 2
    min_formality: casual
    color_palette: [black, red, burgundy, blush, pink, navy, cream, white, emerald, wine]
  party:
    formality_gap_max: 2
    min_formality: casual
    color_palette: [black, gold, silver, red, cobalt, emerald, purple, hot-pink, white, sequin]
  everyday:
    formality_gap_max: 2
    min_formality: loungewear
    color_palette: [denim, white, gray, grey, navy, black, beige, olive, tan, cream]
  travel:
    formality_gap_max: 2
    min_formality: casual
    color_palette: [navy, black, gray, grey, beige, olive, denim, white, tan, charcoal]
  outdoor:
    formality_gap_max: 2
    min_formality: casual
    color_palette: [olive, khaki, tan, brown, forest, navy, orange, rust, cream, denim]
  workout:
