    - [navy, black]
    - [purple, red]
    - [yellow, green]
    - [lime, hot-pink]
    - [orange, purple]

occasions:
  formal-event:
    formality_gap_max: 0
    min_formality: business
    banned_footwear: [sneakers, sandals, slides, trainers, flip-flops]
    required_polish: true
  work:
    formality_gap_max: 1
    min_formality: smart-casual
    banned_footwear: [flip-flops, slides]
  date:
    formality_gap_max: 2
    min_formality: casual
  party:
    formality_gap_max: 2
    min_formality: casual
  everyday:
    formality_gap_max: 2
    min_formality: loungewear
  travel:
    formality_gap_max: 2
    min_formality: casual
  outdoor:
    formality_gap_max: 2
    min_formality: casual
  workout:
    formality_gap_max: 3
    min_formality: loungewear
    requires_activewear: true
  loungewear:
    formality_gap_max: 3
    min_formality: loungewear

patterns:
  statement:
    - striped
    - plaid
    - checked
    - floral
    - polka-dot
    - graphic
    - animal-print
    - camo
  clashes:
    - [striped, plaid]
    - [striped, checked]
    - [plaid, checked]
    - [floral, animal-print]
    - [floral, striped]
    - [floral, plaid]
    - [graphic, striped]
    - [graphic, plaid]
    - [graphic, floral]
    - [graphic, animal-print]
    - [graphic, checked]
    - [polka-dot, striped]
    - [polka-dot, plaid]
    - [camo, floral]
    - [camo, plaid]
    - [animal-print, striped]

footwear:
  casual_only:
    - sneakers
    - sandals
    - slides
    - flip-flops
    - trainers
    - running-shoes
  formal_types:
    - heels
    - oxfords
    - loafers
    - dress-shoes
    - pumps
    - brogues
    - derbies

textures:
  # Material pairs that harmonize (natural texture mixing).
  harmonious:
    - [cotton, denim]
    - [cotton, linen]
    - [wool, leather]
    - [wool, cotton]
    - [cashmere, wool]
    - [silk, wool]
    - [silk, cotton]
    - [leather, denim]
    - [linen, cotton]
    - [suede, denim]
    - [suede, cotton]
    - [denim, leather]
  # Pairs that read unintentional in everyday outfits.
  clashing:
    - [nylon, silk]
    - [polyester, silk]
    - [nylon, wool]
    - [elastane, silk]
    - [acrylic, silk]
    - [down, silk]
  # Default formality association when item formality is unknown.
  material_formality:
    silk: business
    cashmere: business
    wool: smart-casual
    linen: casual
    denim: casual
    leather: smart-casual
    suede: casual
    polyester: casual
    nylon: casual
    elastane: loungewear

category_rules:
  - categories: [activewear, swimwear]
    incompatible_formality: [business, formal]
  - categories: [swimwear]
    incompatible_occasions: [work, formal-event]

weather_seasons:
  hot: [summer]
  warm: [summer, spring]
  mild: [spring, fall]
  cold: [winter, fall]
  rainy: [fall, spring]
  snow: [winter]

cold_weather_tags:
  - cold
  - snow
  - rainy
