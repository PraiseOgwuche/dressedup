    - [olive, cream]
    - [olive, white]
    - [burgundy, navy]
    - [burgundy, gray]
    - [burgundy, grey]
    - [burgundy, cream]
    - [denim, white]
    - [denim, cream]
    - [denim, brown]
    - [denim, tan]
